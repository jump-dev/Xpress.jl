name: CI
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }}-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.XPRESS_JLL_VERSION }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']  # Test against LTS and current minor release
        os: [ubuntu-latest, macOS-latest, windows-latest]
        arch: [default]
        # If updating most recent version, change shell script below
        XPRESS_JLL_VERSION: ['9.4.1', '9.8.1']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
        env:
          XPRESS_JL_SKIP_LIB_CHECK: "true"
      - shell: julia --project=. --color=yes {0}
        run: |
          write("xpauth.xpr", ENV["XPRESS_LICENSE"])
          import Pkg
          Pkg.add(; name = "Xpress_jll", version = ENV["XPRESS_JLL_VERSION"])
        env:
          XPRESS_LICENSE: ${{ secrets.XPRESS_LICENSE }}
          XPRESS_JLL_VERSION: ${{ matrix.XPRESS_JLL_VERSION }}
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  test-local:
    name: Test-local-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: 'x64'
      - uses: julia-actions/cache@v3
      - shell: bash
        run: |
          cd deps
          curl -L https://anaconda.org/fico-xpress/xpresslibs/9.8.1/download/linux-64/xpresslibs-9.8.1-1771425194.tar.bz2 -o x86_64-linux-gnu.tar.bz2
          tar -xjf x86_64-linux-gnu.tar.bz2
          cd lib
          ln -s libxprs.so.46.01.02 libxprs.so
      - shell: julia --project=. --color=yes {0}
        run: |
          write("deps/custom-xpauth.xpr", ENV["XPRESS_LICENSE"])
        env:
          XPRESS_LICENSE: ${{ secrets.XPRESS_LICENSE }}
      - uses: julia-actions/julia-buildpkg@v1
        env:
          XPRESSDIR: "/home/runner/work/Xpress.jl/Xpress.jl/deps"
      - uses: julia-actions/julia-runtest@v1
        env:
          XPRESS_JL_LOCAL: true
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
